<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr. Jennia Michaeli — Curriculum Vitae</title>
  <link rel="stylesheet" href="cv-style.css" />
</head>
<body>

  <!-- ── TOOLBAR ──────────────────────────────────────────────────────────── -->
  <div class="toolbar no-print" id="toolbar">
    <div class="toolbar-inner">
      <span class="toolbar-name">Dr. Jennia Michaeli, MD — CV</span>
      <div class="toolbar-actions">
        <div class="auth-status" id="authStatus">
          <span class="auth-dot" id="authDot"></span>
          <span id="authLabel">Loading…</span>
        </div>
        <button class="btn-toolbar btn-save" id="btnSave" disabled title="Save changes to Google Drive">💾 Save</button>
        <button class="btn-toolbar btn-export" id="btnExport">⬇ Export DOCX</button>
      </div>
    </div>
  </div>

  <!-- ── SIDE NAV ─────────────────────────────────────────────────────────── -->
  <nav class="sidenav no-print" id="sidenav">
    <div class="sidenav-title">Sections</div>
    <ul id="sidenavList"></ul>
  </nav>

  <!-- ── TOAST ────────────────────────────────────────────────────────────── -->
  <div class="toast no-print" id="toast"></div>

  <!-- ── MAIN CV DOCUMENT ─────────────────────────────────────────────────── -->
  <div class="cv-wrap" id="cvWrap">
    <div class="cv-doc" id="cvDoc">
      <div class="cv-loading" id="cvLoading">
        <div class="loading-spinner"></div>
        <p>Loading CV data…</p>
      </div>
    </div>
  </div>

  <!-- ── EXPORT MODAL ─────────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="exportModal" aria-hidden="true">
    <div class="modal modal-export">
      <div class="modal-header">
        <h2>Export DOCX</h2>
        <button class="modal-close" id="exportModalClose">✕</button>
      </div>
      <div class="modal-body">
        <p class="modal-hint">Select the sections to include in the exported Word document. Section numbering will update automatically based on your selection.</p>
        <div class="export-controls">
          <button class="btn-link" id="exportSelectAll">Select all</button>
          <button class="btn-link" id="exportDeselectAll">Deselect all</button>
        </div>
        <div id="exportCheckboxTree"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="exportCancel">Cancel</button>
        <button class="btn-primary" id="exportDownload">⬇ Download DOCX</button>
      </div>
    </div>
  </div>

  <!-- ── EDIT MODAL ───────────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="editModal" aria-hidden="true">
    <div class="modal modal-edit">
      <div class="modal-header">
        <h2 id="editModalTitle">Edit</h2>
        <button class="modal-close" id="editModalClose">✕</button>
      </div>
      <div class="modal-body" id="editModalBody"></div>
      <div class="modal-footer" id="editModalFooter">
        <button class="btn-secondary" id="editCancel">Cancel</button>
        <button class="btn-primary" id="editSave">Save</button>
      </div>
    </div>
  </div>

  <!-- ── CONFIRM DIALOG ───────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="confirmModal" aria-hidden="true">
    <div class="modal modal-confirm">
      <div class="modal-header">
        <h2 id="confirmTitle">Confirm</h2>
      </div>
      <div class="modal-body">
        <p id="confirmMsg" style="font-size:14px;color:#333;line-height:1.5"></p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="confirmNo">Cancel</button>
        <button class="btn-danger" id="confirmYes">Delete</button>
      </div>
    </div>
  </div>

  <script src="cv-config.js"></script>
  <script src="cv-data.js"></script>
  <script src="cv-drive.js"></script>
  <script src="cv-render.js"></script>
  <script src="cv-export.js"></script>
  <script src="cv-edit.js"></script>
  <script src="cv-main.js"></script>

</body>
</html>
